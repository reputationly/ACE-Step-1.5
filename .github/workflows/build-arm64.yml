name: Build ACE-Step-1.5 ARM64 image to ACR

# Independent engine image (mirrors index-tts/.github/workflows/build-arm64.yml):
# lay the ACE-Step-1.5 app on top of the LightX2V arm64 CUDA base (which already
# ships aarch64 CUDA torch) and push to Aliyun ACR. NOT part of the gpustack main
# image — this is a standalone built-in-backend engine image.
#
# The node NEVER git-clones: it pulls this ACR image (code baked in). GitHub is
# only the CI build host.
#
# Secrets (repo Settings -> Secrets, same names as the gpustack fork / indextts):
#   ACR_USERNAME / ACR_PASSWORD
#
# Run: GitHub -> Actions -> "Build ACE-Step-1.5 ARM64 image to ACR" -> Run workflow
#   or: gh workflow run build-arm64.yml --ref main

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: 'CUDA+torch base on Docker Hub (fast pull from GitHub runners; same base LightX2V/IndexTTS use)'
        default: 'arronlee/lightx2v:arm64-cu128-a100-base'
        required: true
      dest_tag:
        description: 'Floating ACR tag to publish'
        default: 'arm64-a100-latest'
        required: true

env:
  ACR_REGISTRY: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com
  ACR_REPO: crpi-xzr81d0490mc3794.cn-shanghai.personal.cr.aliyuncs.com/reputationly/acestep

jobs:
  build:
    # GitHub native arm64 runner (same as LightX2V / IndexTTS). Fast because the
    # base is pulled from Docker Hub, not cross-border Aliyun ACR.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    permissions:
      contents: write   # for creating the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute immutable tag
        id: tags
        run: |
          echo "version=arm64-a100-$(date -u +%Y%m%d-%H%M)-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push (arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lightx2v
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base_image }}
          tags: |
            ${{ env.ACR_REPO }}:${{ github.event.inputs.dest_tag }}
            ${{ env.ACR_REPO }}:${{ steps.tags.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ACE-Step-1.5 ${{ steps.tags.outputs.version }}
          body: |
            ACE-Step-1.5 arm64 built-in-backend image — pushed to Aliyun ACR.

            - Floating tag: `${{ env.ACR_REPO }}:${{ github.event.inputs.dest_tag }}`
            - Immutable tag: `${{ env.ACR_REPO }}:${{ steps.tags.outputs.version }}`
            - Digest: `${{ steps.build.outputs.digest }}`
            - Base: `${{ github.event.inputs.base_image }}`
            - Commit: ${{ github.sha }}

            **Distribute (air-gapped):** on 238 run `lx2v-node.sh prepare-transfer` (pull -> save -> NFS tar), then `docker load` on nodes.

            **Contents:** ACE-Step-1.5 text-to-music (DiT + VAE + 5Hz-LM). REST API on :8001 (in-memory queue, workers=1). Run the 5Hz LM with lm_backend=pt on arm A100 (no flash-attn).

      - name: Summary
        run: |
          {
            echo "### ACE-Step-1.5 arm64 image pushed to ACR"
            echo ""
            echo "- \`${ACR_REPO}:${{ github.event.inputs.dest_tag }}\` (floating)"
            echo "- \`${ACR_REPO}:${{ steps.tags.outputs.version }}\` (immutable)"
            echo ""
            echo "Distribute: on 238 run \`lx2v-node.sh prepare-transfer\` (pull -> save -> NFS tar), then \`docker load\` on nodes."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ACR_REPO: ${{ env.ACR_REPO }}
